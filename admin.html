<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appliquei - Centro de Comando</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-4 md:p-8 font-sans">

    <div id="login-section" class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-20 border border-slate-200">
        <h2 class="text-2xl mb-6 font-semibold text-slate-700">Acesso Administrativo</h2>
        <input type="password" id="admin-token" placeholder="Insira o ADMIN_API_TOKEN" class="w-full border border-slate-300 p-3 mb-4 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold p-3 rounded transition-colors">Aceder ao Painel</button>
        <p id="error-msg" class="text-red-500 text-sm mt-4 hidden text-center">Acesso negado. Verifique o token fornecido.</p>
    </div>

    <div id="dashboard-section" class="hidden max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b pb-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">Métricas do Sistema</h1>
                <p class="text-sm text-slate-500 mt-1">Última atualização: <span id="last-update" class="font-medium"></span></p>
            </div>
            <button id="logout-btn" class="mt-4 md:mt-0 text-sm text-red-600 hover:text-red-800 font-medium">Encerrar Sessão</button>
        </div>

        <div id="alert-antifraud" class="mb-6 p-4 rounded-md border text-sm font-medium flex items-center"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-blue-500">
                <h3 class="text-slate-500 text-xs uppercase font-bold tracking-wider">Ativos Pagantes</h3>
                <p id="val-active" class="text-4xl font-black mt-2 text-slate-800">0</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-yellow-400">
                <h3 class="text-slate-500 text-xs uppercase font-bold tracking-wider">No Período de Teste</h3>
                <p id="val-trial" class="text-4xl font-black mt-2 text-slate-800">0</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-emerald-500">
                <h3 class="text-slate-500 text-xs uppercase font-bold tracking-wider">Ganhos c/ Indicações</h3>
                <p id="val-earnings" class="text-3xl font-bold mt-2 text-slate-800">R$ 0,00</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-orange-400">
                <h3 class="text-slate-500 text-xs uppercase font-bold tracking-wider">Cashback Pendente</h3>
                <p id="val-cashback" class="text-3xl font-bold mt-2 text-slate-800">R$ 0,00</p>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-lg shadow-sm border border-slate-200 border-t-4 border-t-indigo-600">
            <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">⚡ Central de Superpoderes</h2>

            <div class="flex flex-col lg:flex-row gap-4 mb-4">
                <input type="email" id="action-email" placeholder="E-mail do utilizador alvo" class="flex-1 border border-slate-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />

                <select id="action-type" class="border border-slate-300 p-2 rounded">
                    <option value="xray">🔍 Visão Geral da Assinatura (Raio-X)</option>
                    <option value="set_discount">💰 Colocar / Tirar Desconto</option>
                    <option value="make_pro">🌟 Tornar Utilizador PRO (Forçar Acesso)</option>
                    <option value="extend_trial">⏳ Estender Trial (+7 dias)</option>
                    <option value="force_verify">🛡️ Forçar E-mail Verificado</option>
                    <option value="reset_billing">⚠️ Resetar Doc Billing</option>
                </select>

                <input type="number" step="0.01" id="action-value" placeholder="Valor (R$)" class="hidden w-32 border border-slate-300 p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />

                <button id="execute-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2 rounded transition-colors whitespace-nowrap">Executar Comando</button>
            </div>

            <div class="bg-slate-900 rounded p-4 text-green-400 font-mono text-sm overflow-x-auto min-h-[160px] whitespace-pre-wrap" id="action-output">Pronto para receber comandos...</div>
        </div>
    </div>

    <script>
        const DESTRUCTIVE = new Set(['reset_billing', 'make_pro']);

        const $ = (id) => document.getElementById(id);
        const formatBRL = (cents) => (cents / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        function toggleValueInput() {
            const action = $('action-type').value;
            const valueInput = $('action-value');
            if (action === 'set_discount') {
                valueInput.classList.remove('hidden');
            } else {
                valueInput.classList.add('hidden');
                valueInput.value = '';
            }
        }

        function renderXray(email, data) {
            const output = $('action-output');
            output.textContent = '';
            const r = data.resumo || {};
            const header = document.createElement('p');
            header.className = 'text-blue-400 font-bold mb-2';
            header.textContent = `📋 VISÃO GERAL: ${email}`;
            output.appendChild(header);

            const lines = [
                ['UID', data.uid, 'text-gray-300'],
                ['Status Asaas', r.statusAsaas, r.statusAsaas === 'ACTIVE' ? 'text-green-400 font-bold' : 'text-red-400 font-bold'],
                ['Último Pagamento', r.ultimoPagamento, 'text-gray-300'],
                ['Desconto Acumulado', r.descontoPendente, 'text-yellow-400 font-bold'],
                ['Fim do Trial', r.trialExpiraEm, 'text-gray-300'],
                ['ID Asaas', r.idAsaas, 'text-gray-300'],
                ['E-mail verificado', r.emailVerified ? 'sim' : 'não', r.emailVerified ? 'text-green-400' : 'text-orange-400'],
            ];
            lines.forEach(([label, value, valueClass]) => {
                const p = document.createElement('p');
                p.className = 'text-white';
                p.textContent = `${label}: `;
                const span = document.createElement('span');
                span.className = valueClass;
                span.textContent = value == null ? '—' : String(value);
                p.appendChild(span);
                output.appendChild(p);
            });
        }

        async function loadStats() {
            const tokenInput = $('admin-token').value;
            const token = tokenInput || sessionStorage.getItem('adminToken');
            if (!token) return;

            try {
                const res = await fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error('Falha na autenticação');

                const data = await res.json();
                sessionStorage.setItem('adminToken', token);
                $('login-section').classList.add('hidden');
                $('dashboard-section').classList.remove('hidden');
                $('error-msg').classList.add('hidden');

                $('last-update').textContent = new Date(data.generatedAt).toLocaleString('pt-PT');
                $('val-active').textContent = data.billing.active || 0;
                $('val-trial').textContent = data.billing.trialActive || 0;
                $('val-earnings').textContent = formatBRL(data.billing.totalEarningsCents || 0);
                $('val-cashback').textContent = formatBRL(data.billing.totalPendingCashbackCents || 0);

                const alertBox = $('alert-antifraud');
                if (data.readinessHints.antifraudInitSafeToEnable) {
                    alertBox.className = 'mb-6 p-4 rounded-md border text-sm font-medium flex items-center bg-green-50 border-green-200 text-green-800';
                    alertBox.textContent = '✅ Segurança: tráfego estável. É seguro ativar a trava antifraude.';
                } else {
                    alertBox.className = 'mb-6 p-4 rounded-md border text-sm font-medium flex items-center bg-red-50 border-red-200 text-red-800';
                    alertBox.textContent = '⚠️ Segurança: elevado número de bloqueios (rate-limit). Considere ativar antifraude.';
                }
            } catch (err) {
                $('error-msg').classList.remove('hidden');
                sessionStorage.removeItem('adminToken');
            }
        }

        async function executeSuperpower() {
            const email = $('action-email').value.trim();
            const action = $('action-type').value;
            const actionValue = $('action-value').value;
            const token = sessionStorage.getItem('adminToken');
            const output = $('action-output');

            if (!email) {
                output.textContent = 'Erro: digite o e-mail do utilizador.';
                return;
            }

            if (DESTRUCTIVE.has(action)) {
                const label = action === 'reset_billing' ? 'APAGAR o documento de billing' : 'forçar este utilizador a PRO';
                if (!confirm(`Tens a certeza que queres ${label} para ${email}?\n\nEsta ação fica registada no audit log.`)) {
                    return;
                }
            }

            output.textContent = 'A consultar banco de dados...\n';

            try {
                const res = await fetch('/api/admin/action', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ action, email, actionValue }),
                });

                const data = await res.json();

                if (!res.ok) {
                    output.textContent += `\n[ERRO] ${data.error || 'Falha na execução'}\nDetalhe: ${data.detail || ''}`;
                    return;
                }

                if (action === 'xray') {
                    renderXray(email, data);
                } else {
                    output.textContent += `\n[SUCESSO] ${data.message}`;
                }
            } catch (err) {
                output.textContent += `\n[ERRO FATAL] ${err.message}`;
            }
        }

        function logout() {
            sessionStorage.removeItem('adminToken');
            location.reload();
        }

        $('login-btn').addEventListener('click', loadStats);
        $('admin-token').addEventListener('keydown', (e) => { if (e.key === 'Enter') loadStats(); });
        $('logout-btn').addEventListener('click', logout);
        $('action-type').addEventListener('change', toggleValueInput);
        $('execute-btn').addEventListener('click', executeSuperpower);

        if (sessionStorage.getItem('adminToken')) {
            loadStats();
        }
    </script>
</body>
</html>
