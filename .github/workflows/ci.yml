name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Silencia o aviso "Node.js 20 actions are deprecated". As actions oficiais
# (checkout/setup-node) ainda usam Node 20 internamente em sua implementação;
# este env força o runner a executá-las em Node 24, como GitHub vai obrigar
# por default a partir de 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 alinha CI com o dev environment local; necessário para
          # expansão de glob no `node --test "test/**/*.test.js"` (Node 20
          # não suporta — falha com "Could not find" e força mudança de
          # test runner).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Format check fica de fora por enquanto: arquivos legados não foram
      # reformatados em massa para não inflar o diff. Novos commits são
      # formatados via lint-staged (pre-commit). Rode `npm run format` para
      # adotar tudo gradualmente.
      - name: Lint
        run: npm run lint

      - name: Unit tests (node --test)
        run: npm test

      - name: Billing flow tests
        run: npm run test:flows

      - name: Vite build (Onda 2)
        run: npm run build
