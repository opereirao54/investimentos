name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Silencia o aviso "Node.js 20 actions are deprecated". As actions oficiais
# (checkout/setup-node) ainda usam Node 20 internamente em sua implementação;
# este env força o runner a executá-las em Node 24, como GitHub vai obrigar
# por default a partir de 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22 alinha CI com o dev environment local; necessário para
          # expansão de glob no `node --test "test/**/*.test.js"` (Node 20
          # não suporta — falha com "Could not find" e força mudança de
          # test runner).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Format check fica de fora por enquanto: arquivos legados não foram
      # reformatados em massa para não inflar o diff. Novos commits são
      # formatados via lint-staged (pre-commit). Rode `npm run format` para
      # adotar tudo gradualmente.
      - name: Lint
        run: npm run lint

      - name: Unit tests (node --test)
        run: npm test

      - name: Billing flow tests
        run: npm run test:flows

      - name: Vite build (Onda 2)
        run: npm run build

  e2e:
    # Smoke E2E (Playwright) contra `vite preview`. Roda em job separado
    # para não atrasar feedback de lint+unit; ainda bloqueia merge se falhar.
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache do browser Chromium — ~150MB por download. Chave fixa pela
      # versão exata do @playwright/test (mudou versão = baixa de novo).
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
